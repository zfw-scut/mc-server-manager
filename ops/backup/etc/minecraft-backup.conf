# Non-secret configuration for 你好新蒸程.
SERVER_DIR=/data/minecraft/hello-new-generation
BACKUP_DIR=/data/minecraft/backups/hello-new-generation
BACKUP_PREFIX=hello-new-generation
MINECRAFT_SERVICE=hello-new-generation.service
MINECRAFT_USER=minecraft
MINECRAFT_HOME=/data/minecraft
MINECRAFT_START_TIMEOUT_SECONDS=300
PLAYER_CHECK_MAX_GAP_SECONDS=600
UPLOAD_RETRY_DELAY_MINUTES=60
UPLOAD_PART_SIZE_MIB=256
REMOTE_QUERY_ATTEMPTS=4
REMOTE_QUERY_RETRY_SECONDS=10

# Paths are relative to the bdpan application root: /apps/bdpan/.
REMOTE_ROOT=mc-backups/hello-new-generation

# Keep the newest local cold backups. 3-5 is supported.
MAX_LOCAL_BACKUPS=3
MIN_FREE_GIB=5

# Upload only after every player has remained offline for 30 minutes.
OFFLINE_DELAY_MINUTES=30

# bdpan cannot delete files. At this count, new uploads stop until manual cleanup.
REMOTE_MAX_BACKUPS=100

RCON_HOST=127.0.0.1
RCON_PORT=25575
RCON_TIMEOUT=120

BDPAN_BIN=/data/minecraft/.local/bin/bdpan
